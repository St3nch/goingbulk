name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  database-rebuild:
    name: Database rebuild smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Run database hammer smoke tests
        run: pnpm db:hammer
        env:
          GOINGBULK_DB_CONTAINER: supabase_db_goingbulk
